apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: infra
  labels:
    app.kubernetes.io/name: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
    spec:
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              chown -R 999:999 /var/lib/rabbitmq
              chmod 700 /var/lib/rabbitmq
              if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then
                chmod 600 /var/lib/rabbitmq/.erlang.cookie
              fi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          envFrom:
            - secretRef:
                name: rabbitmq-secret
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data
