apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: infra
  labels:
    app.kubernetes.io/name: rabbitmq
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: infra
  labels:
    app.kubernetes.io/name: rabbitmq
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: management
      port: 15672
      targetPort: management
